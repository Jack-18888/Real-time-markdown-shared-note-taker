services:
  db:
    image: postgres:latest
    container_name: markdown-notes-postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypostgrespassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markdown-notes-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://myuser:mypostgrespassword@db:5432/mydatabase"
      JWT_ACCESS_SECRET: "change-this-in-production"
      JWT_REFRESH_SECRET: "change-this-in-production-too"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
      PORT: "3000"
      CLIENT_ORIGIN: "http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
